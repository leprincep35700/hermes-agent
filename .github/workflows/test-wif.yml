name: Test WIF Anthropic

on:
  workflow_dispatch:
    inputs:
      audience:
        description: "OIDC audience configured in the Anthropic federation rule"
        required: true
        default: "anthropic"
      hermes_ref:
        description: "Hermes branch/ref to checkout for Hermes CLI E2E"
        required: true
        default: "feat/anthropic-wif-auth"
      model:
        description: "Anthropic model for smoke tests"
        required: true
        default: "claude-sonnet-4-5"
      run_direct_smoke_test:
        description: "Call Anthropic Messages API directly after token exchange"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_hermes_e2e:
        description: "Install this Hermes ref and test hermes auth/chat through WIF"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  id-token: write
  contents: read

jobs:
  test-wif:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_ORGANIZATION_ID: 4ffd071c-2a30-48ac-872f-24554fede34b
      ANTHROPIC_SERVICE_ACCOUNT_ID: svac_01LApMkSXS9TdaMfcR7LFXpH
      ANTHROPIC_FEDERATION_RULE_ID: fdrl_019iNg9SddG3pXtoiLgtKFUz
      HERMES_HOME: /tmp/hermes-home
      ANTHROPIC_IDENTITY_TOKEN_FILE: /tmp/github-oidc.jwt
    steps:
      - name: Get GitHub OIDC token
        shell: bash
        run: |
          set -euo pipefail
          response=$(curl -fsSL \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${{ inputs.audience }}")
          token=$(jq -r '.value' <<<"$response")
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "GitHub did not return an OIDC token" >&2
            exit 1
          fi
          echo "::add-mask::$token"
          printf '%s' "$token" > "$ANTHROPIC_IDENTITY_TOKEN_FILE"
          chmod 600 "$ANTHROPIC_IDENTITY_TOKEN_FILE"
          echo "OIDC token written to $ANTHROPIC_IDENTITY_TOKEN_FILE"
          python3 - <<'PY'
          import base64, json, os
          from pathlib import Path
          token = Path(os.environ['ANTHROPIC_IDENTITY_TOKEN_FILE']).read_text().strip()
          payload = token.split('.')[1]
          payload += '=' * (-len(payload) % 4)
          claims = json.loads(base64.urlsafe_b64decode(payload.encode()))
          keep = ['iss', 'aud', 'sub', 'repository', 'repository_owner', 'ref', 'workflow', 'event_name', 'job_workflow_ref']
          print('OIDC claims for Anthropic rule matching:')
          print(json.dumps({k: claims.get(k) for k in keep if k in claims}, indent=2))
          PY

      - name: Exchange JWT for Anthropic access token directly
        id: exchange
        shell: bash
        run: |
          set -euo pipefail
          payload=$(python3 - <<'PY'
          import json, os
          from pathlib import Path
          print(json.dumps({
              "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
              "assertion": Path(os.environ['ANTHROPIC_IDENTITY_TOKEN_FILE']).read_text(),
              "federation_rule_id": os.environ["ANTHROPIC_FEDERATION_RULE_ID"],
              "organization_id": os.environ["ANTHROPIC_ORGANIZATION_ID"],
              "service_account_id": os.environ["ANTHROPIC_SERVICE_ACCOUNT_ID"],
          }))
          PY
          )

          response_file="$RUNNER_TEMP/anthropic-token-response.json"
          http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST https://api.anthropic.com/v1/oauth/token \
            -H "Content-Type: application/json" \
            -H "User-Agent: claude-cli/1.0.0 (external, cli)" \
            -d "$payload")

          access_token=$(jq -r '.access_token // empty' "$response_file")
          if [ -n "$access_token" ]; then
            echo "::add-mask::$access_token"
          fi

          echo "HTTP status: $http_code"
          jq 'if .access_token then .access_token="[REDACTED]" else . end
              | if .refresh_token then .refresh_token="[REDACTED]" else . end
              | if .id_token then .id_token="[REDACTED]" else . end' "$response_file"

          if [[ "$http_code" != 2* ]]; then
            echo "Anthropic token exchange failed" >&2
            exit 1
          fi
          if [ -z "$access_token" ]; then
            echo "Anthropic response did not include access_token" >&2
            exit 1
          fi

          printf '%s' "$access_token" > "$RUNNER_TEMP/anthropic-access-token"
          chmod 600 "$RUNNER_TEMP/anthropic-access-token"
          echo "exchange_ok=true" >> "$GITHUB_OUTPUT"

      - name: Direct Claude smoke test
        if: ${{ inputs.run_direct_smoke_test == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          access_token=$(cat "$RUNNER_TEMP/anthropic-access-token")
          response_file="$RUNNER_TEMP/anthropic-message-response.json"
          http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST https://api.anthropic.com/v1/messages \
            -H "Authorization: Bearer ${access_token}" \
            -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: oauth-2025-04-20,claude-code-20250219" \
            -d "$(jq -n --arg model '${{ inputs.model }}' '{model: $model, max_tokens: 8, messages: [{role: "user", content: "Reply with only: WIF OK"}]}')")

          echo "HTTP status: $http_code"
          jq . "$response_file"
          if [[ "$http_code" != 2* ]]; then
            echo "Claude direct smoke test failed" >&2
            exit 1
          fi

      - name: Check out Hermes ref
        if: ${{ inputs.run_hermes_e2e == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.hermes_ref }}

      - name: Install Hermes from checkout
        if: ${{ inputs.run_hermes_e2e == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .
          hermes auth add anthropic --help | grep -E 'wif|federation-rule-id|identity-token-file'

      - name: Refresh GitHub OIDC token for Hermes E2E
        if: ${{ inputs.run_hermes_e2e == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          # Anthropic appears to reject reusing the same JWT assertion after an exchange.
          # Generate a fresh GitHub OIDC token for the Hermes CLI E2E path.
          response=$(curl -fsSL \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${{ inputs.audience }}")
          token=$(jq -r '.value' <<<"$response")
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "GitHub did not return a fresh OIDC token" >&2
            exit 1
          fi
          echo "::add-mask::$token"
          printf '%s' "$token" > "$ANTHROPIC_IDENTITY_TOKEN_FILE"
          chmod 600 "$ANTHROPIC_IDENTITY_TOKEN_FILE"

      - name: Hermes auth WIF and chat E2E
        if: ${{ inputs.run_hermes_e2e == 'true' }}
        shell: bash
        env:
          ANTHROPIC_API_KEY: ""
        run: |
          set -euo pipefail
          mkdir -p "$HERMES_HOME"
          hermes auth add anthropic --type wif \
            --federation-rule-id "$ANTHROPIC_FEDERATION_RULE_ID" \
            --organization-id "$ANTHROPIC_ORGANIZATION_ID" \
            --service-account-id "$ANTHROPIC_SERVICE_ACCOUNT_ID" \
            --identity-token-file "$ANTHROPIC_IDENTITY_TOKEN_FILE"

          echo "Hermes auth status for anthropic:"
          hermes auth status anthropic || hermes auth list anthropic || true

          hermes chat --provider anthropic -m "${{ inputs.model }}" -q "Reply with only: WIF OK" | tee "$RUNNER_TEMP/hermes-chat.out"
          if grep -q "HTTP Error\|Unauthorized\|Authentication failed" "$RUNNER_TEMP/hermes-chat.out"; then
            echo "Hermes chat reported an auth error" >&2
            exit 1
          fi
          grep -q "WIF OK" "$RUNNER_TEMP/hermes-chat.out"
